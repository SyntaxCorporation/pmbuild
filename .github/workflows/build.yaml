name: Build postmarketOS Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git python3 python3-pip kpartx sudo

    - name: Clone pmbootstrap
      run: |
        git clone https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
        cd pmbootstrap
        ./pmbootstrap.py --version

    - name: Initialize pmbootstrap
      run: |
        cd pmbootstrap
        yes "" | ./pmbootstrap.py init

    - name: Configure device
      run: |
        cd pmbootstrap
        ./pmbootstrap.py config device a2corelte
        ./pmbootstrap.py config arch armv7
        ./pmbootstrap.py config ui none

    - name: Add packages
      run: |
        cd pmbootstrap
        ./pmbootstrap.py config extra_packages "vim python3 python3-pip nodejs gcc"

    - name: Build rootfs
      run: |
        cd pmbootstrap
        ./pmbootstrap.py install

    - name: Upload build
      uses: actions/upload-artifact@v4
      with:
        name: pmos-build
        path: ~/.local/var/pmbootstrap
