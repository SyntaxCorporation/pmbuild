name: Build postmarketOS Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git python3 python3-pip python3-venv \
          build-essential bzip2 xz-utils zip unzip sudo \
          qemu-user-static binfmt-support

      - name: Install Python modules
        run: |
          pip3 install --user tomli

      - name: Clone pmbootstrap
        run: |
          git clone https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

      - name: Prepare work directories
        run: |
          mkdir -p /home/runner/pmos-work
          mkdir -p /home/runner/pmaports

      - name: Init pmbootstrap
        run: |
          export PATH=$HOME/.local/bin:$PATH
          cd pmbootstrap

          printf "/home/runner/pmos-work\n/home/runner/pmaports\nedge\nsamsung\na2corelte\nstable\nuser\n\n" | python3 pmbootstrap.py init

      - name: Build root filesystem
        run: |
          export PATH=$HOME/.local/bin:$PATH
          cd pmbootstrap
          python3 pmbootstrap.py install --no-fde --password 1234

      - name: Export image
        run: |
          export PATH=$HOME/.local/bin:$PATH
          cd pmbootstrap
          python3 pmbootstrap.py export

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: postmarketos-image
          path: /home/runner/pmos-work
