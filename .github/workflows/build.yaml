name: pmos-build

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y git python3 python3-pip qemu-user-static qemu-utils kpartx sudo
          pip3 install --user tomli

      - name: Clone pmbootstrap
        run: |
          git clone https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

      - name: Init pmbootstrap
        run: |
          export PATH=$HOME/.local/bin:$PATH
          mkdir -p /home/runner/pmos-work
          cd pmbootstrap
          printf "edge\nsamsung\na2corelte\nstable\nuser\n\n" | ./pmbootstrap.py -w /home/runner/pmos-work init

      - name: Configure device
        run: |
          export PATH=$HOME/.local/bin:$PATH
          cd pmbootstrap
          ./pmbootstrap.py -w /home/runner/pmos-work config device a2corelte
          ./pmbootstrap.py -w /home/runner/pmos-work config arch armv7
          ./pmbootstrap.py -w /home/runner/pmos-work config ui console
          ./pmbootstrap.py -w /home/runner/pmos-work config extra_packages "vim python3 python3-pip nodejs gcc"

      - name: Build image
        run: |
          export PATH=$HOME/.local/bin:$PATH
          cd pmbootstrap
          ./pmbootstrap.py -w /home/runner/pmos-work install --no-interactive --filesystem ext4

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pmos-image
          path: /home/runner/pmos-work
