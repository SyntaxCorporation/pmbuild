name: Build postmarketOS

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: ubuntu:22.04
      options: --privileged

    steps:
      - name: Install base tools
        run: |
          apt update
          apt install -y git sudo python3 python3-pip kpartx qemu-user-static wget

      - name: Clone repository
        run: |
          git clone https://github.com/${{ github.repository }} repo
          cd repo

      - name: Clone pmbootstrap
        run: |
          git clone https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

      - name: Initialize pmbootstrap
        run: |
          cd pmbootstrap
          printf "edge\nsamsung\na2corelte\nstable\nuser\n" | ./pmbootstrap.py -w /work init

      - name: Configure build
        run: |
          cd pmbootstrap
          ./pmbootstrap.py -w /work config device a2corelte
          ./pmbootstrap.py -w /work config arch armv7
          ./pmbootstrap.py -w /work config ui console
          ./pmbootstrap.py -w /work config extra_packages "vim python3 python3-pip nodejs gcc"

      - name: Build image
        run: |
          cd pmbootstrap
          ./pmbootstrap.py -w /work install --no-interactive

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: postmarketos-image
          path: /work
