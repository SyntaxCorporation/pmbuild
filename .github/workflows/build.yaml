name: Build postmarketOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git python3 python3-pip sudo \
        qemu-user-static binfmt-support

    - name: Install python modules
      run: |
        pip3 install --user tomli

    - name: Clone pmbootstrap
      run: |
        git clone https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

    - name: Setup directories
      run: |
        mkdir -p /home/runner/pmos-work

    - name: Initialize pmbootstrap
      run: |
        export PATH=$HOME/.local/bin:$PATH
        cd pmbootstrap

        printf "/home/runner/pmos-work\n\nedge\nsamsung\na2corelte\nstable\nuser\n\n" | python3 pmbootstrap.py init

    - name: Build rootfs
      run: |
        export PATH=$HOME/.local/bin:$PATH
        cd pmbootstrap
        python3 pmbootstrap.py install --no-fde

    - name: Export image
      run: |
        export PATH=$HOME/.local/bin:$PATH
        cd pmbootstrap
        python3 pmbootstrap.py export

    - name: Upload image
      uses: actions/upload-artifact@v4
      with:
        name: postmarketos-image
        path: /home/runner/pmos-work
