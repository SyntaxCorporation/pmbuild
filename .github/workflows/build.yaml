name: Build postmarketOS Image

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git python3 python3-pip kpartx qemu-user-static sudo

    - name: Clone pmbootstrap
      run: |
        git clone https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
        cd pmbootstrap
        ./pmbootstrap.py --version

    - name: Initialize pmbootstrap
      run: |
        cd pmbootstrap
        printf "\n\n\n\n\n\n\n" | ./pmbootstrap.py init

    - name: Configure build
      run: |
        cd pmbootstrap
        ./pmbootstrap.py config device a2corelte
        ./pmbootstrap.py config arch armv7
        ./pmbootstrap.py config ui none
        ./pmbootstrap.py config extra_packages "vim python3 python3-pip nodejs gcc"

    - name: Build image
      run: |
        cd pmbootstrap
        ./pmbootstrap.py install --no-interactive

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: pmos-build
        path: ~/.local/var/pmbootstrap
